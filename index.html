<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TaxFile Pro — 2025 Tax Calculator</title>
<style>
  :root{--navy:#17284f;--accent:#21806b;--accent2:#2aa085;--bg:#f6f8fb;--card:#fff;--ink:#1c2333;--muted:#5b6472;--line:#e4e9f0;--danger:#b23030;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;background:var(--navy);color:#fff}
  .nav .brand{font-weight:700;font-size:18px}
  .nav .tag{font-size:12px;color:#a9bbe0}
  .wrap{max-width:1040px;margin:0 auto;padding:26px 20px}
  .steps{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .pill{font-size:12px;padding:6px 12px;border-radius:999px;background:#eef2f8;color:var(--muted);border:1px solid var(--line);cursor:pointer}
  .pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .pill.done{background:var(--accent);color:#fff;border-color:var(--accent)}
  .grid{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
  h2{margin:0 0 16px;color:var(--navy);font-size:20px}
  .field{margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  label .hint{font-weight:400;color:var(--muted)}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--accent2);border-color:var(--accent2)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .chk{display:flex;align-items:center;gap:8px;font-size:14px;margin:8px 0}
  .chk input{width:auto}
  .btn{display:inline-block;background:var(--accent);color:#fff;padding:11px 20px;border-radius:9px;font-weight:600;font-size:15px;border:none;cursor:pointer}
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .actions{display:flex;justify-content:space-between;margin-top:20px}
  .summary{position:sticky;top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .summary h3{margin:0 0 10px;color:var(--navy)}
  .big{font-size:30px;font-weight:800}
  .big.refund{color:var(--accent)}.big.owed{color:var(--danger)}
  .line{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .line span:first-child{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td{padding:4px 0}
  td.ln{color:var(--muted);width:52px}
  td.amt{text-align:right}
  tr.emph td{font-weight:700;color:var(--navy)}
  .warn{background:#fff7e6;border:1px solid #ffe0a3;color:#7a5200;padding:10px 12px;border-radius:9px;font-size:13px;margin-top:10px}
  .note{background:#eef6ff;border:1px solid #cfe4ff;color:#1b4b7a;padding:12px 14px;border-radius:10px;font-size:13px;margin-top:16px}
  .disc{font-size:12px;color:var(--muted);margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
  @media print{.nav,.steps,.actions,.summary,.noprint{display:none!important}.grid{display:block}.card{border:none;padding:0}}

  /* Official Form 1040 replica */
  #f1040{display:none;position:fixed;inset:0;background:#fff;overflow:auto;z-index:9999;padding:0}
  body.show1040 #f1040{display:block}
  body.show1040 .nav,body.show1040 .wrap{display:none}
  .f1040-bar{position:sticky;top:0;background:var(--navy);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 18px}
  .f1040-bar button{margin-left:10px}
  .page1040{max-width:760px;margin:16px auto;background:#fff;color:#000;padding:26px 30px;font-family:"Times New Roman",Georgia,serif;font-size:12px}
  .f-head{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:8px}
  .f-head .t{font-size:20px;font-weight:700}
  .f-head .sub{font-size:11px}
  .f-omb{text-align:right;font-size:10px}
  .f-row{display:flex;border-bottom:1px solid #999;padding:2px 0;align-items:flex-start}
  .f-row .no{width:34px;font-weight:700;flex:none}
  .f-row .lab{flex:1;padding-right:8px}
  .f-row .amt{width:120px;text-align:right;border-left:1px solid #ccc;padding-left:6px;font-variant-numeric:tabular-nums}
  .f-sec{background:#e9eef5;font-weight:700;padding:3px 4px;margin-top:10px;border-top:2px solid #000}
  .f-id{display:flex;gap:16px;flex-wrap:wrap;margin:6px 0}
  .f-id div{font-size:12px}
  .f-id b{display:block;font-size:10px;color:#333;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .f-status{margin:6px 0;font-size:12px}
  .f-status .box{display:inline-block;border:1.5px solid #000;width:12px;height:12px;text-align:center;line-height:11px;margin-right:4px;vertical-align:middle;font-weight:700}
  .f-note{font-size:10px;color:#444;margin-top:14px;border-top:1px solid #000;padding-top:6px}
  .f-pg{text-align:center;font-size:10px;color:#555;margin-top:10px}
  @media print{
    .f1040-bar{display:none!important}
    body.show1040 *{visibility:hidden}
    body.show1040 #f1040,body.show1040 #f1040 *{visibility:visible}
    #f1040{position:absolute;overflow:visible}
    .page1040{margin:0 auto;page-break-after:always}
    @page{size:letter;margin:0.5in}
  }

  /* Entity chooser home */
  .hero{text-align:center;max-width:720px;margin:8px auto 24px}
  .hero h1{font-size:30px;color:var(--navy);margin:0 0 8px}
  .hero p{color:var(--muted);font-size:16px;margin:0}
  .entity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:0 auto}
  @media(max-width:760px){.entity-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.entity-grid{grid-template-columns:1fr}}
  .ecard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left}
  .ecard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(23,40,79,.12);border-color:var(--accent2)}
  .ecard .ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
  .ecard h3{margin:0 0 4px;color:var(--navy);font-size:17px}
  .ecard .form{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.3px}
  .ecard p{margin:8px 0 0;font-size:13px;color:var(--muted);line-height:1.45}
  .backlink{display:inline-block;margin-bottom:14px;color:var(--navy);font-size:14px;cursor:pointer;font-weight:600}
  .backlink:hover{color:var(--accent)}
  .k1card{background:#f2f7f5;border:1px solid #cfe6de;border-radius:12px;padding:14px;margin:8px 0}
  .k1card b{color:var(--navy)}
</style>
</head>
<body>
  <div class="nav">
    <div class="brand" style="cursor:pointer" onclick="window.__goHome&&window.__goHome()">TaxFile Pro</div>
    <div class="tag">2025 federal tax year · runs entirely in your browser</div>
  </div>

  <div class="wrap">
    <div id="home"></div>
    <div id="filer" style="display:none">
      <div class="steps" id="steps"></div>
      <div class="grid">
        <div class="card" id="panel"></div>
        <div class="summary" id="summary"></div>
      </div>
    </div>
  </div>

  <div id="f1040"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="engine.web.js"></script>
<script src="business.web.js"></script>
<script>
(function(){
  var mode="home";        // "home" | "individual" | "business"
  var entityType=null;    // for business mode
  var STEPS=["About you","Income","Deductions","Payments","Review"];
  var step=0;
  var f={
    firstName:"",lastName:"",filingStatus:"single",taxpayerAge65OrOlder:false,
    numChildrenCTC:0,numOtherDependents:0,
    wages:"",taxableInterest:"",ordinaryDividends:"",qualifiedDividends:"",
    netLongTermCapitalGains:"",netShortTermCapitalGains:"",retirementDistributions:"",
    socialSecurityBenefits:"",selfEmploymentNetProfit:"",
    qualifiedBusinessIncome:"",qualifiedTips:"",qualifiedOvertime:"",
    tuition:"",retirementContributions:"",
    deductionMethod:"auto",stateAndLocalTaxes:"",mortgageInterest:"",charitableContributions:"",
    federalWithholding:"",estimatedPayments:""
  };
  var el=function(id){return document.getElementById(id);};
  var n=function(s){s=(""+s).trim();return s===""?undefined:Number(s);};
  var usd=function(v,d){return (v||0).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:(d==null?0:d)});};

  function toInput(){
    var deps=[];
    for(var i=0;i<f.numChildrenCTC;i++)deps.push({qualifiesForCTC:true,qualifiesForODC:false});
    for(var j=0;j<f.numOtherDependents;j++)deps.push({qualifiesForCTC:false,qualifiesForODC:true});
    return {
      filingStatus:f.filingStatus,taxpayerAge65OrOlder:f.taxpayerAge65OrOlder,dependents:deps,
      wages:n(f.wages),taxableInterest:n(f.taxableInterest),ordinaryDividends:n(f.ordinaryDividends),
      qualifiedDividends:n(f.qualifiedDividends),netLongTermCapitalGains:n(f.netLongTermCapitalGains),
      netShortTermCapitalGains:n(f.netShortTermCapitalGains),
      retirementDistributions:n(f.retirementDistributions),selfEmploymentNetProfit:n(f.selfEmploymentNetProfit),
      socialSecurityBenefits:n(f.socialSecurityBenefits),
      qualifiedBusinessIncome:n(f.qualifiedBusinessIncome),qualifiedTips:n(f.qualifiedTips),
      qualifiedOvertime:n(f.qualifiedOvertime),
      aotcExpenses:n(f.tuition),aotcStudents:(n(f.tuition)?1:undefined),
      retirementContributions:n(f.retirementContributions),
      deductionMethod:f.deductionMethod==="auto"?undefined:f.deductionMethod,
      itemized:{stateAndLocalTaxes:n(f.stateAndLocalTaxes),mortgageInterest:n(f.mortgageInterest),charitableContributions:n(f.charitableContributions)},
      federalWithholding:n(f.federalWithholding),estimatedPayments:n(f.estimatedPayments)
    };
  }

  function field(label,key,opts){
    opts=opts||{};
    var type=opts.type||"number";
    return '<div class="field"><label>'+label+'</label>'+
      '<input data-key="'+key+'" type="'+type+'" '+(type==="number"?'min="0" inputmode="decimal" placeholder="0"':'')+' value="'+(f[key]!=null?String(f[key]).replace(/"/g,"&quot;"):"")+'"></div>';
  }

  function renderSteps(){
    el("steps").innerHTML=STEPS.map(function(s,i){
      var cls=i===step?"active":i<step?"done":"";
      return '<span class="pill '+cls+'" data-step="'+i+'">'+(i+1)+". "+s+"</span>";
    }).join("");
    Array.prototype.forEach.call(el("steps").querySelectorAll(".pill"),function(p){
      p.onclick=function(){step=Number(p.getAttribute("data-step"));render();};
    });
  }

  function panelHtml(){
    if(step===0){
      return '<h2>About you</h2>'+
        '<div class="row">'+field("First name","firstName",{type:"text"})+field("Last name","lastName",{type:"text"})+'</div>'+
        '<div class="field"><label>Filing status</label><select data-key="filingStatus">'+
        ['single|Single','married_jointly|Married filing jointly','married_separately|Married filing separately','head_of_household|Head of household','qualifying_surviving_spouse|Qualifying surviving spouse']
          .map(function(o){var p=o.split("|");return '<option value="'+p[0]+'"'+(f.filingStatus===p[0]?" selected":"")+'>'+p[1]+'</option>';}).join("")+
        '</select></div>'+
        '<label class="chk"><input type="checkbox" data-key="taxpayerAge65OrOlder"'+(f.taxpayerAge65OrOlder?" checked":"")+'> I am 65 or older (unlocks the 2025 senior deduction)</label>'+
        '<div class="row">'+field('Children (Child Tax Credit) <span class="hint">under 17</span>',"numChildrenCTC")+field('Other dependents <span class="hint">$500 each</span>',"numOtherDependents")+'</div>';
    }
    if(step===1){
      return '<h2>Income</h2>'+
        field("Wages (W-2 box 1)","wages")+
        field("Taxable interest","taxableInterest")+
        '<div class="row">'+field("Ordinary dividends","ordinaryDividends")+field("Qualified dividends","qualifiedDividends")+'</div>'+
        '<div class="row">'+field("Net long-term capital gains","netLongTermCapitalGains")+field("Net short-term capital gains","netShortTermCapitalGains")+'</div>'+
        field("Retirement / IRA distributions (taxable)","retirementDistributions")+
        field('Social Security benefits <span class="hint">total, box 5 — we compute the taxable part</span>',"socialSecurityBenefits")+
        field("Self-employment net profit (Schedule C)","selfEmploymentNetProfit")+
        field("Qualified business income (for §199A)","qualifiedBusinessIncome")+
        '<div class="row">'+field("Qualified tips (2025 deduction)","qualifiedTips")+field("Qualified overtime (2025 deduction)","qualifiedOvertime")+'</div>'+
        '<h2 style="font-size:15px;margin-top:18px">Credits</h2>'+
        '<div class="row">'+field('College tuition paid <span class="hint">education credit</span>',"tuition")+field('IRA / 401(k) contributions <span class="hint">saver\'s credit</span>',"retirementContributions")+'</div>';
    }
    if(step===2){
      return '<h2>Deductions</h2>'+
        '<div class="field"><label>Deduction method</label><select data-key="deductionMethod">'+
        ['auto|Optimize for me (recommended)','standard|Standard deduction','itemized|Itemize']
          .map(function(o){var p=o.split("|");return '<option value="'+p[0]+'"'+(f.deductionMethod===p[0]?" selected":"")+'>'+p[1]+'</option>';}).join("")+
        '</select></div>'+
        '<p style="font-size:13px;color:var(--muted)">Enter itemized amounts; when set to optimize we use whichever is larger.</p>'+
        field("State &amp; local taxes (SALT, capped $10k)","stateAndLocalTaxes")+
        field("Home mortgage interest","mortgageInterest")+
        field("Charitable contributions","charitableContributions");
    }
    if(step===3){
      return '<h2>Payments</h2>'+
        field("Federal income tax withheld (W-2 box 2)","federalWithholding")+
        field("Estimated tax payments","estimatedPayments");
    }
    // Review
    var r=TaxEngine.computeTax(toInput());
    var emph={"9":1,"11":1,"15":1,"16":1,"22":1,"33":1,"34":1,"37":1};
    var rows=r.lineItems.map(function(li){
      return '<tr class="'+(emph[li[0]]?"emph":"")+'"><td class="ln">'+li[0]+'</td><td>'+li[1]+'</td><td class="amt">'+usd(li[2],2)+'</td></tr>';
    }).join("");
    var warns=(r.warnings||[]).map(function(w){return '<div class="warn">'+w+'</div>';}).join("");
    return '<h2>Review &amp; save</h2><table><tbody>'+rows+'</tbody></table>'+warns+
      '<div class="actions noprint" style="gap:10px;justify-content:flex-start;flex-wrap:wrap">'+
      '<button class="btn" id="dlPacket" onclick="window.__downloadPacket&&window.__downloadPacket(this)">Download full filing packet (1040 + schedules)</button>'+
      '<button class="btn ghost" id="dlIRS" onclick="window.__downloadIRS1040&&window.__downloadIRS1040(this)">Just the 1040</button>'+
      '<button class="btn ghost" onclick="window.__print1040&&window.__print1040()">Print view</button></div>'+
      '<div class="note">The <b>filing packet</b> gives you the filled official IRS Form 1040 (2025) <b>plus every schedule your return needs</b> (Schedule 1, 2, SE, 8812, 8995, D…) in one PDF — ready to review, print, or e-file yourself. Figures are for your review; verify against your documents before filing. This tool does not e-file for you.</div>';
  }

  function bind(){
    Array.prototype.forEach.call(el("panel").querySelectorAll("[data-key]"),function(inp){
      var key=inp.getAttribute("data-key");
      var ev=(inp.type==="checkbox")?"change":"input";
      inp.addEventListener(ev,function(){
        if(inp.type==="checkbox")f[key]=inp.checked;
        else if(inp.type==="number")f[key]=inp.value===""?"":(key.indexOf("num")===0?Number(inp.value):inp.value);
        else f[key]=inp.value;
        renderSummary();
      });
    });
  }

  function renderSummary(){
    var r=TaxEngine.computeTax(toInput());
    var refund=r.refundOwed>=0;
    el("summary").innerHTML='<h3>Live 2025 estimate</h3>'+
      '<div class="big '+(refund?"refund":"owed")+'">'+usd(Math.abs(r.refundOwed))+'</div>'+
      '<div style="color:var(--muted);font-size:13px;margin-bottom:12px">'+(refund?"Estimated refund":"Estimated balance due")+'</div>'+
      line("Total income",r.totalIncome)+line("AGI",r.adjustedGrossIncome)+
      line("Deduction ("+r.deductionMethodUsed+")",r.deductionTaken)+
      line("Taxable income",r.taxableIncome)+line("Total tax",r.totalTax)+
      line("Effective rate",(r.effectiveRate*100).toFixed(1)+"%",true)+
      line("Marginal rate",(r.marginalRate*100).toFixed(0)+"%",true);
  }
  function line(a,b,raw){return '<div class="line"><span>'+a+'</span><span>'+(raw?b:usd(b))+'</span></div>';}

  function render(){
    renderSteps();
    var showNext=step<STEPS.length-1;
    el("panel").innerHTML=panelHtml()+
      '<div class="actions noprint">'+
      '<button class="btn ghost" id="back"'+(step===0?" disabled":"")+'>&larr; Back</button>'+
      (showNext?'<button class="btn" id="next">Next &rarr;</button>':'<span></span>')+
      '</div>';
    bind();
    var b=el("back"),nx=el("next");
    if(b)b.onclick=function(){if(step>0){step--;render();}};
    if(nx)nx.onclick=function(){if(step<STEPS.length-1){step++;render();}};
    renderSummary();
  }

  // ---- Official IRS Form 1040 (2025) renderer ----
  function frow(no,lab,amt,strong){
    var a = amt===""||amt==null ? "" : usd(amt,0);
    return '<div class="f-row"'+(strong?' style="font-weight:700"':'')+'>'+
      '<div class="no">'+no+'</div><div class="lab">'+lab+'</div><div class="amt">'+a+'</div></div>';
  }
  function statusBoxes(sel){
    var opts=[["single","Single"],["married_jointly","Married filing jointly"],
      ["married_separately","Married filing separately"],["head_of_household","Head of household"],
      ["qualifying_surviving_spouse","Qualifying surviving spouse"]];
    return opts.map(function(o){
      return '<span style="margin-right:14px"><span class="box">'+(o[0]===sel?"X":"")+'</span>'+o[1]+'</span>';
    }).join("");
  }
  window.__close1040=function(){document.body.classList.remove("show1040");window.scrollTo(0,0);};
  window.__print1040=function(){
    var inp=toInput(); var r=TaxEngine.computeTax(inp);
    var name=((f.firstName||"")+" "+(f.lastName||"")).trim();
    var wages=Number(inp.wages)||0, interest=Number(inp.taxableInterest)||0;
    var qDiv=Number(inp.qualifiedDividends)||0, oDiv=Number(inp.ordinaryDividends)||0;
    var ltcg=Number(inp.netLongTermCapitalGains)||0;
    var retire=Number(inp.retirementDistributions)||0;
    var seProfit=Number(inp.selfEmploymentNetProfit)||0;
    var wh=Number(inp.federalWithholding)||0, est=Number(inp.estimatedPayments)||0;
    var credits19=r.childTaxCredit+r.otherDependentCredit;
    var line22=Math.max(0,r.tentativeTax-credits19);
    var otherTax=r.selfEmploymentTax+r.additionalMedicareTax+r.netInvestmentIncomeTax;
    var otherPay=r.earnedIncomeCredit+r.additionalChildTaxCredit;

    var bar='<div class="f1040-bar noprint">'+
      '<div>Official IRS Form 1040 · Tax year 2025</div>'+
      '<div><button class="btn" onclick="window.print()">Print / Save as PDF</button>'+
      '<button class="btn ghost" style="color:#fff;border-color:#4a5d8f" onclick="window.__close1040()">Close</button></div></div>';

    var page1='<div class="page1040">'+
      '<div class="f-head"><div><div class="t">Form 1040</div>'+
        '<div class="sub">U.S. Individual Income Tax Return</div></div>'+
        '<div class="f-omb"><div style="font-size:18px;font-weight:700">2025</div>'+
        'Dept. of the Treasury — IRS<br>OMB No. 1545-0074</div></div>'+
      '<div class="f-id"><div><b>Name</b>'+(name||"&nbsp;")+'</div>'+
        '<div><b>Social security number</b>___-__-____</div></div>'+
      '<div class="f-status"><b style="display:block;font-size:10px;text-transform:uppercase">Filing Status</b>'+
        statusBoxes(inp.filingStatus)+'</div>'+
      frow("1a","Total amount from Form(s) W-2, box 1",wages)+
      frow("1z","Total wages",wages)+
      frow("2b","Taxable interest",interest)+
      frow("3a","Qualified dividends",qDiv)+
      frow("3b","Ordinary dividends",oDiv)+
      frow("5b","Pensions, annuities, and IRA distributions (taxable)",retire)+
      frow("6b","Taxable Social Security benefits",Number(inp.taxableSocialSecurity)||0)+
      frow("7","Capital gain or (loss)",ltcg+(Number(inp.netShortTermCapitalGains)||0))+
      frow("8","Additional income from Schedule 1 (incl. Schedule C)",seProfit+(Number(inp.otherIncome)||0))+
      frow("9","Total income",r.totalIncome,true)+
      frow("10","Adjustments to income",r.adjustmentsToIncome)+
      frow("11","Adjusted gross income (AGI)",r.adjustedGrossIncome,true)+
      frow("12","Standard or itemized deduction ("+r.deductionMethodUsed+")",r.deductionTaken)+
      (r.seniorDeduction?frow("13a","Additional deduction for age 65+ (2025)",r.seniorDeduction):"")+
      (r.tipsDeduction?frow("13b","Deduction for qualified tips (2025)",r.tipsDeduction):"")+
      (r.overtimeDeduction?frow("13c","Deduction for qualified overtime (2025)",r.overtimeDeduction):"")+
      frow("13d","Qualified business income deduction",r.qbiDeduction)+
      frow("14","Total deductions",r.deductionTaken+r.seniorDeduction+r.tipsDeduction+r.overtimeDeduction+r.qbiDeduction)+

  // ---- Fill the OFFICIAL IRS Form 1040 (2025) PDF, client-side ----
  // Field map verified by rendering the real f1040-2025.pdf. All names carry the
  // "[0]" suffix. Money lines, identity, and filing status confirmed on-page.
  var P1="topmostSubform[0].Page1[0].", P2="topmostSubform[0].Page2[0].";
  function m1040(n){ return n ? Math.round(n).toString() : ""; }

  // Fill the official 1040 template and return the loaded PDFDocument (unsaved).
  async function fill1040Doc(inp, r){
    var bytes=await fetch("f1040-2025.pdf").then(function(x){return x.arrayBuffer();});
    var doc=await PDFLib.PDFDocument.load(bytes);
    var form=doc.getForm();
    var set=function(name,val){ if(val===""||val==null)return; try{form.getTextField(name+"[0]").setText(String(val));}catch(e){} };
    var check=function(name){ try{form.getCheckBox(name).check();}catch(e){} };
    set(P1+"f1_14",((f.firstName||"")).trim());
    set(P1+"f1_15",((f.lastName||"")).trim());
    var fsMap={single:"Checkbox_ReadOrder[0].c1_8[0]",married_jointly:"Checkbox_ReadOrder[0].c1_8[1]",
      married_separately:"Checkbox_ReadOrder[0].c1_8[2]",head_of_household:"c1_8[0]",qualifying_surviving_spouse:"c1_8[1]"};
    check(P1+fsMap[inp.filingStatus]);
    var wages=Number(inp.wages)||0;
    var cap=Number(r.netCapitalGain)||0;
    var sch1=(Number(r.scheduleCNetProfit)||0)+(Number(inp.otherIncome)||0);
    set(P1+"f1_47",m1040(wages)); set(P1+"f1_57",m1040(wages));
    set(P1+"f1_59",m1040(Number(inp.taxableInterest)||0));
    set(P1+"f1_60",m1040(Number(inp.qualifiedDividends)||0));
    set(P1+"f1_61",m1040(Number(inp.ordinaryDividends)||0));
    set(P1+"f1_66",m1040(Number(inp.retirementDistributions)||0));
    set(P1+"f1_69",m1040(Number(r.taxableSocialSecurity)||0));
    set(P1+"f1_70",m1040(cap));
    set(P1+"f1_72",m1040(sch1));
    set(P1+"f1_73",m1040(r.totalIncome));
    set(P1+"f1_74",m1040(r.adjustmentsToIncome));
    set(P1+"f1_75",m1040(r.adjustedGrossIncome));
    var add13b=r.obbbaAdditionalDeductions||0;
    var line14=r.deductionTaken+r.qbiDeduction+add13b;
    var credits19=r.childTaxCredit+r.otherDependentCredit;
    var taxAfterAmt=r.tentativeTax+(r.alternativeMinimumTax||0);
    var line22=Math.max(0,taxAfterAmt-credits19);
    var wh=Number(inp.federalWithholding)||0;
    var otherPay=r.earnedIncomeCredit+r.additionalChildTaxCredit+(r.educationCreditRefundable||0);
    set(P2+"f2_01",m1040(r.adjustedGrossIncome));
    set(P2+"f2_02",m1040(r.deductionTaken));
    set(P2+"f2_03",m1040(r.qbiDeduction));
    set(P2+"f2_04",m1040(add13b));
    set(P2+"f2_05",m1040(line14));
    set(P2+"f2_06",m1040(r.taxableIncome));
    set(P2+"f2_08",m1040(taxAfterAmt));
    set(P2+"f2_10",m1040(taxAfterAmt));
    set(P2+"f2_11",m1040(credits19));
    set(P2+"f2_13",m1040(credits19));
    set(P2+"f2_14",m1040(line22));
    set(P2+"f2_15",m1040(r.totalOtherTaxes||0));
    set(P2+"f2_16",m1040(r.totalTax));
    set(P2+"f2_17",m1040(wh)); set(P2+"f2_20",m1040(wh));
    set(P2+"f2_21",m1040(Number(inp.estimatedPayments)||0));
    set(P2+"f2_23",m1040(r.earnedIncomeCredit));
    set(P2+"f2_24",m1040(r.additionalChildTaxCredit));
    set(P2+"f2_28",m1040(otherPay));
    set(P2+"f2_29",m1040(r.totalPayments));
    if(r.refundOwed>=0){ set(P2+"f2_30",m1040(r.refundOwed)); set(P2+"f2_31",m1040(r.refundOwed)); }
    else set(P2+"f2_35",m1040(-r.refundOwed));
    form.updateFieldAppearances();
    return doc;
  }

  function dl(bytes, filename){
    var blob=new Blob([bytes],{type:"application/pdf"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }

    if(typeof PDFLib==="undefined"){ alert("PDF library still loading — try again."); return; }

  // ---- Generated schedule pages (mirror the app's schedulePages.ts) ----
  function schedulesFor(inp, r){
    var nz=function(x){return Number(x)||0;};
    var out=[], half=function(){return r.selfEmploymentTax/2;};
    if(nz(r.scheduleCNetProfit)||nz(inp.otherIncome)||nz(r.adjustmentsToIncome))
      out.push({title:"Schedule 1 (Form 1040)",sub:"Additional Income and Adjustments to Income",rows:[
        ["3","Business income or (loss) (Schedule C)",nz(r.scheduleCNetProfit)],
        ["8","Other income",nz(inp.otherIncome)],
        ["10","Total additional income (to Form 1040, line 8)",nz(r.scheduleCNetProfit)+nz(inp.otherIncome)],
        ["","— Part II: Adjustments to Income —",null],
        ["15","Deductible part of self-employment tax",half()],
        ["25","Total adjustments (to Form 1040, line 10)",r.adjustmentsToIncome]]});
    if(nz(r.alternativeMinimumTax)+nz(r.selfEmploymentTax)+nz(r.additionalMedicareTax)+nz(r.netInvestmentIncomeTax)>0)
      out.push({title:"Schedule 2 (Form 1040)",sub:"Additional Taxes",rows:[
        ["1","Alternative minimum tax (Form 6251)",nz(r.alternativeMinimumTax)],
        ["3","Total Part I (to Form 1040, line 17)",nz(r.alternativeMinimumTax)],
        ["","— Part II: Other Taxes —",null],
        ["4","Self-employment tax (Schedule SE)",nz(r.selfEmploymentTax)],
        ["11","Additional Medicare Tax",nz(r.additionalMedicareTax)],
        ["12","Net investment income tax",nz(r.netInvestmentIncomeTax)],
        ["21","Total other taxes (to Form 1040, line 23)",nz(r.totalOtherTaxes)]]});
    if(nz(r.educationCreditNonRefundable)+nz(r.saversCredit)>0)
      out.push({title:"Schedule 3 (Form 1040)",sub:"Additional Credits and Payments",rows:[
        ["3","Education credits (Form 8863, nonrefundable)",nz(r.educationCreditNonRefundable)],
        ["4","Retirement savings contributions credit (Form 8880)",nz(r.saversCredit)],
        ["8","Total nonrefundable credits (to Form 1040, line 20)",nz(r.educationCreditNonRefundable)+nz(r.saversCredit)]]});
    if(nz(r.selfEmploymentTax)>0)
      out.push({title:"Schedule SE (Form 1040)",sub:"Self-Employment Tax",rows:[
        ["2","Net profit from Schedule C",nz(r.scheduleCNetProfit)],
        ["4a","Net earnings from self-employment (× 92.35%)",Math.round(nz(r.scheduleCNetProfit)*0.9235)],
        ["12","Self-employment tax (to Schedule 2, line 4)",nz(r.selfEmploymentTax)],
        ["13","Deduction for one-half of SE tax (to Schedule 1, line 15)",half()]]});
    if(nz(r.childTaxCredit)+nz(r.otherDependentCredit)+nz(r.additionalChildTaxCredit)>0)
      out.push({title:"Schedule 8812 (Form 1040)",sub:"Credits for Qualifying Children and Other Dependents",rows:[
        ["1","Adjusted gross income (Form 1040, line 11)",nz(r.adjustedGrossIncome)],
        ["12","Child tax credit / ODC (to Form 1040, line 19)",nz(r.childTaxCredit)+nz(r.otherDependentCredit)],
        ["27","Additional child tax credit — refundable (to line 28)",nz(r.additionalChildTaxCredit)]]});
    if(nz(r.qbiDeduction)>0)
      out.push({title:"Form 8995",sub:"Qualified Business Income Deduction (Simplified)",rows:[
        ["1","Total qualified business income",nz(inp.qualifiedBusinessIncome)],
        ["5","QBI component (20% of line 1)",Math.round(nz(inp.qualifiedBusinessIncome)*0.2)],
        ["15","QBI deduction (to Form 1040, line 13)",nz(r.qbiDeduction)]]});
    if(nz(r.netCapitalGain)!==0){
      var rows=[["16","Total capital gain or (loss) (to Form 1040, line 7)",nz(r.netCapitalGain)]];
      if(nz(r.capitalLossCarryoverNextYear)<0) rows.push(["","Capital loss carryover to 2026: "+usd(Math.abs(nz(r.capitalLossCarryoverNextYear)),2),null]);
      out.push({title:"Schedule D (Form 1040)",sub:"Capital Gains and Losses",rows:rows});
    }
    return out;
  }

  async function drawSchedulePage(out, sched, font, bold, taxpayer){
    var rgb=PDFLib.rgb, page=out.addPage([612,792]);
    var navy=rgb(0.09,0.15,0.33), gray=rgb(0.4,0.4,0.4);
    page.drawText(sched.title,{x:40,y:748,size:15,font:bold,color:navy});
    page.drawText(sched.sub,{x:40,y:730,size:10,font:font,color:gray});
    page.drawText("2025 · "+taxpayer,{x:400,y:748,size:10,font:font,color:gray});
    page.drawLine({start:{x:40,y:722},end:{x:572,y:722},thickness:1.5,color:navy});
    var y=700;
    sched.rows.forEach(function(row){
      if(row[2]===null){ page.drawText(row[1],{x:40,y:y,size:9.5,font:bold,color:navy}); y-=20; return; }
      var emph=/Total|to Form 1040|to Schedule|to line/i.test(row[1]);
      var ff=emph?bold:font;
      page.drawText(row[0],{x:44,y:y,size:9,font:font,color:gray});
      page.drawText(row[1],{x:80,y:y,size:10,font:ff,color:emph?navy:rgb(0.15,0.15,0.15)});
      var t=usd(row[2],2), w=ff.widthOfTextAtSize(t,10);
      page.drawText(t,{x:572-w,y:y,size:10,font:ff,color:emph?navy:rgb(0.15,0.15,0.15)});
      page.drawLine({start:{x:40,y:y-5},end:{x:572,y:y-5},thickness:0.4,color:rgb(0.85,0.88,0.92)});
      y-=20;
    });
    page.drawText("Generated in the official schedule's line structure. Estimate for review; verify before filing.",{x:40,y:40,size:7.5,font:font,color:gray});
  }

  window.__downloadPacket=async function(btn){
    if(typeof PDFLib==="undefined"){ alert("PDF library still loading — try again."); return; }
    var label=btn?btn.textContent:""; if(btn){ btn.textContent="Building packet…"; btn.disabled=true; }
    try{
      var inp=toInput(), r=TaxEngine.computeTax(inp);
      var name=((f.firstName||"")+" "+(f.lastName||"")).trim()||"Taxpayer";
      var out=await PDFLib.PDFDocument.create();
      var font=await out.embedFont(PDFLib.StandardFonts.Helvetica);
      var bold=await out.embedFont(PDFLib.StandardFonts.HelveticaBold);
      var rgb=PDFLib.rgb, navy=rgb(0.09,0.15,0.33);

      // Filled official 1040
      var filled=await fill1040Doc(inp, r);
      var fdoc=await PDFLib.PDFDocument.load(await filled.save());
      var pgs=await out.copyPages(fdoc, fdoc.getPageIndices());
      pgs.forEach(function(p){ out.addPage(p); });
      var included=["Form 1040"];

      // Generated schedules
      var scheds=schedulesFor(inp, r);
      for(var i=0;i<scheds.length;i++){ await drawSchedulePage(out, scheds[i], font, bold, name); included.push(scheds[i].title+" — "+scheds[i].sub); }

      // Coversheet at the front
      var cover=out.insertPage(0,[612,792]);
      cover.drawRectangle({x:0,y:722,width:612,height:70,color:navy});
      cover.drawText("TaxFile Pro",{x:40,y:756,size:20,font:bold,color:rgb(1,1,1)});
      cover.drawText("2025 Filing Packet — Form Checklist",{x:40,y:736,size:11,font:font,color:rgb(0.8,0.85,0.95)});
      var y=680;
      cover.drawText("Included (filled) in this packet:",{x:40,y:y,size:12,font:bold,color:navy}); y-=22;
      included.forEach(function(t){ cover.drawText("[x]  "+t,{x:48,y:y,size:10.5,font:font,color:rgb(0.13,0.5,0.42)}); y-=16; });
      cover.drawText("TaxFile Pro — Estimate for review; not filed with the IRS.",{x:40,y:40,size:8,font:font,color:rgb(0.4,0.4,0.4)});

      dl(await out.save(), "Filing-Packet-2025.pdf");
    }catch(e){ alert("Could not build the packet: "+e.message); }
    finally{ if(btn){ btn.textContent=label; btn.disabled=false; } }
  };

    el("panel").innerHTML=body;
    // bind business inputs
    Array.prototype.forEach.call(el("panel").querySelectorAll("[data-bkey]"),function(inp){
      var key=inp.getAttribute("data-bkey"), ev=(inp.type==="checkbox")?"change":"input";
      inp.addEventListener(ev,function(){ bf[key]=inp.type==="checkbox"?inp.checked:inp.value; renderBusiness(); });
    });
    // business summary sidebar
    var isRefund = (typeof r.refundOwed==="number") ? r.refundOwed>=0 : true;
    var big = (typeof r.totalTax==="number") ? usd(r.totalTax) : usd(0);
    el("summary").innerHTML='<h3>'+r.entity+'</h3>'+
      '<div class="big" style="color:var(--navy)">'+big+'</div>'+
      '<div style="color:var(--muted);font-size:13px;margin-bottom:12px">'+(r.entityLevelTax===0&&!r.totalTax?"No entity-level federal tax":"Estimated total tax")+'</div>'+
      (typeof r.taxableIncome==="number"?line("Taxable income",r.taxableIncome):"")+
      (typeof r.ordinaryBusinessIncome==="number"?line("Ordinary business income",r.ordinaryBusinessIncome):"")+
      (typeof r.refundOwed==="number"?line(r.refundOwed>=0?"Refund":"Balance due",Math.abs(r.refundOwed)):"");
  }

  // ============================ APP DISPATCHER ==============================
  function renderApp(){
    if(mode==="home"){ el("home").style.display=""; el("filer").style.display="none"; renderHome(); return; }
    el("home").style.display="none"; el("filer").style.display="";
    if(mode==="business"){ el("steps").style.display="none"; renderBusiness(); }
    else { el("steps").style.display=""; render(); }
  }

  renderApp();
})();
</script>
</body>
</html>
